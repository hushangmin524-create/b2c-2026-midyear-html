<style>
/* ===========================================
   FIXED 16:9 STAGE: MANDATORY BASE STYLES
   Include this ENTIRE file in every presentation.
   Slides are authored at 1920×1080 and scaled as a whole.
   =========================================== */

/* 1. Lock the browser viewport */
html,
body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: var(--stage-bg, #000);
}

/* 2. Full-window deck viewport */
.deck-viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: var(--stage-bg, #000);
}

/* 3. Fixed 16:9 design canvas.
   JavaScript sets transform: translate(...) scale(...). */
.deck-stage {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    transform-origin: 0 0;
    background: var(--slide-bg, #fff);
}

/* 4. Slides stack inside the fixed stage.
   Content must be laid out at 1920×1080, not reflowed per device. */
.slide {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    display: block;
    visibility: hidden;
    opacity: 0;
    pointer-events: none;
    background: var(--slide-bg, #fff);
}

.slide.active,
.slide.visible {
    visibility: visible;
    opacity: 1;
    pointer-events: auto;
    z-index: 1;
}

/* 5. Keep media inside authored slide bounds */
img,
video,
canvas,
svg {
    max-width: 100%;
    max-height: 100%;
}

/* 6. Presentation chrome stays outside the slide design system */
.deck-controls {
    position: fixed;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    z-index: 1000;
}

/* 7. Print one fixed-size slide per page */
@media print {
    html,
    body {
        width: 1920px;
        height: auto;
        overflow: visible;
        background: #fff;
    }

    .deck-viewport {
        position: static;
        overflow: visible;
        background: #fff;
    }

    .deck-stage {
        position: static;
        width: auto;
        height: auto;
        transform: none !important;
        background: none;
    }

    .slide {
        position: relative;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        width: 1920px;
        height: 1080px;
        break-after: page;
        page-break-after: always;
    }

    .slide:last-child {
        break-after: auto;
        page-break-after: auto;
    }

    .deck-controls {
        display: none !important;
    }
}

/* 8. Reduced motion */
@media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.2s !important;
    }
}

/* === THEME TOKENS === */

.action-title{font-family:var(--font-display);font-size:70px;line-height:1.04;letter-spacing:-.01em;max-width:1550px;margin-bottom:32px;padding-bottom:8px}

/* === FLOW === */

.growth-headlines{display:grid;grid-template-columns:.85fr 1.25fr;gap:12px}.growth-headline{min-height:78px;padding:12px 16px;border-top:2px solid var(--cyan);background:rgba(7,38,64,.74)}.growth-headline span{display:block;color:var(--muted);font-size:16px}.growth-headline b{font-family:var(--font-display);font-size:38px;color:#fff}

function sanitizeReportCopy(){
  var replacements=[
    [/原\s*PPT/g,"业务数据"],
    [/源\s*PPT/g,"业务数据"],
    [/最新\s*PPT/g,"当前测算"],
    [/原素材/g,"当前数据"],
    [/原稿/g,"数据"],
    [/原页/g,"指标"],
    [/源图口径显示：/g,"市场份额趋势显示："],
    [/后续计划页已按新年目标/g,"下半年经营目标已按"],
    [/后续项目页/g,"各专题"],
    [/第\s*16\s*页/g,"下半年目标总览"],
    [/上方只看目标口径，下方只看承接拆解，减少同一数字反复出现。/g,"下半年同时承接规模、收入、开户和新增下载四类目标，核心从增长规模进入经营质量。"],
    [/只承担“目标口径对齐”/g,"聚焦核心目标承接"]
  ];
  function cleanText(v){
    if(typeof v!=="string")return v;
    replacements.forEach(function(pair){v=v.replace(pair[0],pair[1])});
    return v;
  }
  function walk(v){
    if(Array.isArray(v)){v.forEach(function(x,i){v[i]=walk(x)});return v}
    if(v&&typeof v==="object"){Object.keys(v).forEach(function(k){v[k]=walk(v[k])});return v}
    return cleanText(v)
  }
  walk(slidesData);
}
